<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML API</title>
  <link href="https://fonts.googleapis.com/css?family=Pacifico|Arimo|Hind:300|Open+Sans+Condensed:300" rel="stylesheet">
  <style>
    :root {
      --surface: rgba(255, 255, 255, 0.90);
      --surface2: rgba(244, 247, 251, 0.90);
      --text: #102a43;
      --muted: #526c7a;
      --accent: #3f8bfd;
      --accent-2: #34c3ff;
      --accent-alt: #5f73fa;
      --radius: 15px;
      --shadow: 0 20px 50px rgba(35, 61, 89, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Arimo', sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 12% 28%, #e6f0ff 0%, #eff6ff 28%, #f8fbff 70%, #fdfdff 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(78px);
      opacity: 0.45;
      z-index: -1;
    }

    body::before {
      width: 400px;
      height: 400px;
      top: -120px;
      left: -90px;
      background: linear-gradient(135deg, rgba(63, 143, 253, 0.7), rgba(52, 195, 255, 0.4));
    }

    body::after {
      width: 500px;
      height: 500px;
      bottom: -160px;
      right: -80px;
      background: linear-gradient(135deg, rgba(134, 89, 255, 0.64), rgba(73, 166, 255, 0.24));
    }

    .card {
      width: min(680px, 100%);
      background: linear-gradient(160deg, var(--surface), var(--surface2));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(245, 251, 255, 0.7);
      backdrop-filter: blur(9px);
      padding: 2rem;
      display: grid;
      gap: 1rem;
    }

    .title {
      margin: 0;
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.7rem, 3vw, 2.6rem);
      color: #1c4ab3;
      text-align: center;
      letter-spacing: 0.03em;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
      padding-top: 0.5rem;
      letter-spacing: 0.02em;
    }

    .notice {
      text-align: center;
      border: 1px solid #d2e4fe;
      background: #eef5ff;
      color: #1560d7;
      border-radius: 9px;
      padding: 0.75rem 0.8rem;
      font-size: 0.9rem;
      margin-bottom: 0.45rem;
    }

    form {
      display: grid;
      gap: 0.85rem;
    }

    .field-group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.72rem;
    }

    .field {
      display: grid;
      gap: 0.3rem;
    }

    .field label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #275684;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input[type=text] {
      width: 100%;
      border: 1px solid rgba(108, 153, 233, 0.5);
      border-radius: 10px;
      padding: 0.74rem 0.86rem;
      background: linear-gradient(180deg, #fcfdff, #f7fbff);
      transition: border-color 0.24s ease, box-shadow 0.24s ease, transform 0.15s ease;
      font-size: 0.95rem;
      color: #173c68;
    }

    input[type=text]:focus {
      outline: none;
      border-color: var(--accent-alt);
      box-shadow: 0 0 0 3px rgba(100, 149, 255, 0.20);
      transform: translateY(-1px);
    }

    .btn {
      width: 100%;
      border: none;
      color: white;
      font-size: 1.03rem;
      font-weight: 700;
      border-radius: 10px;
      padding: 0.86rem 1rem;
      background: linear-gradient(140deg, var(--accent-alt), var(--accent-2));
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 20px rgba(63, 143, 253, 0.36);
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
      box-shadow: 0 14px 26px rgba(63, 143, 253, 0.40);
    }

    .result {
      font-family: 'Open Sans Condensed', sans-serif;
      font-size: 1.02rem;
      background: linear-gradient(180deg, #e5f4ff, #f2fbff);
      border: 1px dashed #9bc9fb;
      padding: 0.93rem 1rem;
      border-radius: 10px;
      min-height: 2.2rem;
      color: #0f213f;
      transition: transform 0.2s ease, color 0.22s ease;
    }

    .result:empty {
      color: #5f7c98;
    }

    @media (max-width: 760px) {
      .field-group {
        grid-template-columns: 1fr;
      }
      .card { padding: 1.1rem; }
    }

    input[type=text]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(63, 139, 253, 0.18);
    }

    .wide {
      grid-column: 1 / -1;
    }

    .btn {
      width: 100%;
      border: none;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 9px;
      padding: 0.84rem 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .result {
      font-family: 'Open Sans Condensed', sans-serif;
      font-size: 1.05rem;
      background: #e5f4ff;
      border: 1px solid #b6defc;
      padding: 0.85rem 1rem;
      border-radius: 8px;
      min-height: 2.2rem;
      color: #0f213f;
    }

    @media (max-width: 560px) {
      .field-group {
        grid-template-columns: 1fr;
      }
      .card { padding: 1.3rem; }
    }
  </style>
</head>

<body>
  <section class="card" aria-label="Boston House Price Prediction Form">
    <h1 class="title">Boston House Price Prediction</h1>
    <p class="hint">Enter the 13 features and click Predict to get estimated price</p>

    <p class="notice">Tip: Use numeric input and use dot `.` for decimals, e.g. 0.027.</p>
    <form action="{{ url_for('predict')}}" method="post" novalidate>
      <div class="field-group">
        <div class="field"><label for="CRIM">CRIM</label><input id="CRIM" type="text" name="CRIM" placeholder="Per capita crime rate" required></div>
        <div class="field"><label for="ZN">ZN</label><input id="ZN" type="text" name="ZN" placeholder="Residential land zoning" required></div>
        <div class="field"><label for="INDUS">INDUS</label><input id="INDUS" type="text" name="INDUS" placeholder="Non-retail business ratio" required></div>
        <div class="field"><label for="CHAS">CHAS</label><input id="CHAS" type="text" name="CHAS" placeholder="Charles River bound (0 or 1)" required></div>
        <div class="field"><label for="NOX">NOX</label><input id="NOX" type="text" name="NOX" placeholder="Nitric oxide conc." required></div>
        <div class="field"><label for="RM">RM</label><input id="RM" type="text" name="RM" placeholder="Rooms per dwelling" required></div>
        <div class="field"><label for="Age">AGE</label><input id="Age" type="text" name="Age" placeholder="Building age" required></div>
        <div class="field"><label for="DIS">DIS</label><input id="DIS" type="text" name="DIS" placeholder="Weighted distances" required></div>
        <div class="field"><label for="RAD">RAD</label><input id="RAD" type="text" name="RAD" placeholder="Highway accessibility" required></div>
        <div class="field"><label for="TAX">TAX</label><input id="TAX" type="text" name="TAX" placeholder="Property tax rate" required></div>
        <div class="field"><label for="PTRATIO">PTRATIO</label><input id="PTRATIO" type="text" name="PTRATIO" placeholder="Pupil-teacher ratio" required></div>
        <div class="field"><label for="B">B</label><input id="B" type="text" name="B" placeholder="Black proportion" required></div>
        <div class="field"><label for="LSTAT">LSTAT</label><input id="LSTAT" type="text" name="LSTAT" placeholder="Lower status pop" required></div>
      </div>

      <button type="submit" class="btn">Predict</button>
    </form>

    <div class="result" role="status">{{ prediction_text or 'Prediction will appear here' }}</div>
  </section>
</body>

</html>
